<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buyko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
<body style="margin: 0; background-color: #141414;">
    <div id="root">
      <div id="initial-loader" style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #141414;
        font-family: Poppins, Arial, sans-serif;
      ">
        <svg
          width="36"
          height="36"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          style="animation: spin 0.8s linear infinite;"
        >
          <circle cx="12" cy="12" r="10" stroke="#3a3a3a" stroke-width="3" />
          <path d="M22 12a10 10 0 0 0-10-10" stroke="url(#buyko-gradient)" stroke-width="3" stroke-linecap="round" />
          <defs>
            <linearGradient id="buyko-gradient" x1="0" y1="0" x2="24" y2="24">
              <stop offset="0%" stop-color="#fb923c" />
              <stop offset="100%" stop-color="#fb7185" />
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
